name: Windows AIO

on:
  workflow_dispatch:
    inputs:
      build-number:
        description: 'Build number'
        type: string
        default: '1'
      cleanup:
        description: 'Cleanup python environment on completion?'
        type: boolean
        required: false
        default: false

jobs:
  build:

    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}

    steps:
    - uses: actions/checkout@v6
    - uses: msys2/setup-msys2@v2
      with:
        msystem: UCRT64
        update: true
    - name: Build
      run: |
        cd aio
        ./build.sh ${{ inputs.cleanup }} ${{ inputs.build-number }}
    - name: Run unit test suite
      if: ${{ ! inputs.cleanup }} # can only run unit tests if python venv was preserved
      run: |
        export GRAMPS_RESOURCES=build/share
        source /tmp/grampspythonenv/bin/activate
        python3 -m unittest discover -p "*_test.py"
    - uses: actions/upload-artifact@v6
      with:
        name: GrampsAIO
        path: D:\a\gramps\gramps\aio\ucrt64\src\GrampsAIO-*.exe
        if-no-files-found: error
        compression-level: 0 # no compression
        retention-days: 7
