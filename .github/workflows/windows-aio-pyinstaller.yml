name: Windows AIO (PyInstaller)

on:
  workflow_dispatch:
    inputs:
      build-number:
        description: 'Build number'
        type: string
        default: '1'
      cleanup:
        description: 'Cleanup python environment on completion?'
        type: boolean
        required: false
        default: false

jobs:
  build:

    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}

    steps:
    - uses: actions/checkout@v6
    - uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
    - name: Build
      run: |
        cd aio-pyinstaller
        ./build.sh ${{ inputs.cleanup }} ${{ inputs.build-number }}
    - uses: actions/upload-artifact@v4
      with:
        name: GrampsAIO-PyInstaller
        path: D:\a\gramps\gramps\aio-pyinstaller\dist\grampsaio\src\GrampsAIO-*.exe
        retention-days: 7
