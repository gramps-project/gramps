name: Lint

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run black on changed files
        run: |
          pip install black
          git diff --name-only --diff-filter=ACMR origin/master...HEAD \
            | grep '\.py$' \
            | xargs --no-run-if-empty black --check --diff
