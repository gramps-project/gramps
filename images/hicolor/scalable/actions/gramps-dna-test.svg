<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   xmlns="http://www.w3.org/2000/svg"
   width="48px"
   height="48px"
   viewBox="0 0 48 48">
  <!-- DNA Test icon: a stylised double helix inside a circle -->
  <circle cx="24" cy="24" r="22" fill="#4a90d9" stroke="#2c6fad" stroke-width="1.5"/>
  <!-- left strand -->
  <path d="M 16,8 C 16,14 32,16 32,22 C 32,28 16,30 16,36 C 16,42 32,44 32,44"
        fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"
        clip-path="url(#circle-clip)"/>
  <!-- right strand -->
  <path d="M 32,8 C 32,14 16,16 16,22 C 16,28 32,30 32,36 C 32,42 16,44 16,44"
        fill="none" stroke="#ffe082" stroke-width="2.5" stroke-linecap="round"
        clip-path="url(#circle-clip)"/>
  <!-- rungs -->
  <line x1="17" y1="13" x2="31" y2="13" stroke="#c0d8f0" stroke-width="1.5" stroke-linecap="round" clip-path="url(#circle-clip)"/>
  <line x1="23" y1="19" x2="25" y2="19" stroke="#c0d8f0" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="17" y1="25" x2="31" y2="25" stroke="#c0d8f0" stroke-width="1.5" stroke-linecap="round" clip-path="url(#circle-clip)"/>
  <line x1="23" y1="31" x2="25" y2="31" stroke="#c0d8f0" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="17" y1="37" x2="31" y2="37" stroke="#c0d8f0" stroke-width="1.5" stroke-linecap="round" clip-path="url(#circle-clip)"/>
  <defs>
    <clipPath id="circle-clip">
      <circle cx="24" cy="24" r="21.5"/>
    </clipPath>
  </defs>
</svg>
