<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   xmlns="http://www.w3.org/2000/svg"
   width="48px"
   height="48px"
   viewBox="0 0 48 48">
  <!-- DNA Match icon: two small helices with an equals/link symbol between them -->
  <!-- left helix circle -->
  <circle cx="11" cy="24" r="9.5" fill="#4a90d9" stroke="#2c6fad" stroke-width="1.2"/>
  <path d="M 7,16 C 7,20 15,21 15,24 C 15,27 7,28 7,32"
        fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round"
        clip-path="url(#left-clip)"/>
  <path d="M 15,16 C 15,20 7,21 7,24 C 7,27 15,28 15,32"
        fill="none" stroke="#ffe082" stroke-width="2" stroke-linecap="round"
        clip-path="url(#left-clip)"/>
  <line x1="7.5" y1="19" x2="14.5" y2="19" stroke="#c0d8f0" stroke-width="1.2" stroke-linecap="round" clip-path="url(#left-clip)"/>
  <line x1="7.5" y1="24" x2="14.5" y2="24" stroke="#c0d8f0" stroke-width="1.2" stroke-linecap="round" clip-path="url(#left-clip)"/>
  <line x1="7.5" y1="29" x2="14.5" y2="29" stroke="#c0d8f0" stroke-width="1.2" stroke-linecap="round" clip-path="url(#left-clip)"/>
  <!-- right helix circle -->
  <circle cx="37" cy="24" r="9.5" fill="#4a90d9" stroke="#2c6fad" stroke-width="1.2"/>
  <path d="M 33,16 C 33,20 41,21 41,24 C 41,27 33,28 33,32"
        fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round"
        clip-path="url(#right-clip)"/>
  <path d="M 41,16 C 41,20 33,21 33,24 C 33,27 41,28 41,32"
        fill="none" stroke="#ffe082" stroke-width="2" stroke-linecap="round"
        clip-path="url(#right-clip)"/>
  <line x1="33.5" y1="19" x2="40.5" y2="19" stroke="#c0d8f0" stroke-width="1.2" stroke-linecap="round" clip-path="url(#right-clip)"/>
  <line x1="33.5" y1="24" x2="40.5" y2="24" stroke="#c0d8f0" stroke-width="1.2" stroke-linecap="round" clip-path="url(#right-clip)"/>
  <line x1="33.5" y1="29" x2="40.5" y2="29" stroke="#c0d8f0" stroke-width="1.2" stroke-linecap="round" clip-path="url(#right-clip)"/>
  <!-- connector arrows between helices -->
  <line x1="21.5" y1="22" x2="26.5" y2="22" stroke="#5d5d5d" stroke-width="2" stroke-linecap="round"/>
  <line x1="21.5" y1="26" x2="26.5" y2="26" stroke="#5d5d5d" stroke-width="2" stroke-linecap="round"/>
  <defs>
    <clipPath id="left-clip">
      <circle cx="11" cy="24" r="9"/>
    </clipPath>
    <clipPath id="right-clip">
      <circle cx="37" cy="24" r="9"/>
    </clipPath>
  </defs>
</svg>
